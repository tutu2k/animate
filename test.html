<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 测试</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="info">移动鼠标查看效果</div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f1115);
        
        // 创建相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // 添加光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);
        
        // 创建大球体（线框）
        const bigGeometry = new THREE.SphereGeometry(2, 32, 32);
        const bigMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x2a3140, 
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const bigSphere = new THREE.Mesh(bigGeometry, bigMaterial);
        scene.add(bigSphere);
        
        // 创建小球
        const smallGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const smallMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xf59e0b,
            emissive: 0xb45309,
            emissiveIntensity: 0.5
        });
        const follower = new THREE.Mesh(smallGeometry, smallMaterial);
        scene.add(follower);
        
        // 鼠标位置
        let target = { x: 0, y: 0 };
        let current = { x: 0, y: 0 };
        
        // 鼠标事件
        document.addEventListener('mousemove', (event) => {
            const x = (event.clientX / window.innerWidth) * 2 - 1;
            const y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // 简单映射到球体范围
            target.x = x * 2;
            target.y = y * 2;
            
            console.log('Mouse:', event.clientX, event.clientY, '-> Target:', target.x.toFixed(2), target.y.toFixed(2));
        });
        
        // 触摸事件
        document.addEventListener('touchmove', (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            const x = (touch.clientX / window.innerWidth) * 2 - 1;
            const y = -(touch.clientY / window.innerHeight) * 2 + 1;
            
            target.x = x * 2;
            target.y = y * 2;
        }, { passive: false });
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 平滑跟随
            current.x += (target.x - current.x) * 0.1;
            current.y += (target.y - current.y) * 0.1;
            
            // 限制在球体内
            const maxDist = 2 - 0.5; // 大球半径 - 小球半径
            const dist = Math.sqrt(current.x * current.x + current.y * current.y);
            if (dist > maxDist) {
                const scale = maxDist / dist;
                current.x *= scale;
                current.y *= scale;
            }
            
            // 更新小球位置
            follower.position.set(current.x, current.y, 0);
            
            // 旋转大球
            bigSphere.rotation.y += 0.002;
            bigSphere.rotation.x += 0.001;
            
            renderer.render(scene, camera);
        }
        
        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Test page loaded');
        animate();
    </script>
</body>
</html>
